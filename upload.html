<!DOCTYPE html>
<html lang="it-IT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Caricamento documenti – Lozabo</title>
    <link rel="stylesheet" href="./css/main.css">
</head>
<body>
<div class="container">
    <header class="site-header">
        <div class="logo-container">
            <img src="asset\img\logo.png" alt="Lozabo Logo" class="site-logo">
            <span class="site-title">Lozabo</span>
        </div>
        <div class="social-cards">
            <a href="https://twitter.com/" target="_blank" class="social-card">Twitter</a>
            <a href="https://facebook.com/" target="_blank" class="social-card">Facebook</a>
            <a href="https://instagram.com/" target="_blank" class="social-card">Instagram</a>
        </div>
    </header>
    <main>
        <section class="section-box">
            <h3>Caricamento documenti</h3>
            <div class="upload-box">
                <form id="upload-form">
                    <label class="file-label">
                        <input type="file" name="file" required />
                        <span>Scegli documento</span>
                    </label>
                    <button type="submit" class="btn-upload">
                        Carica documento
                    </button>
                </form>
                <p id="status"></p>
            </div>
        </section>
    </main>
    <footer>
        <hr>
        <p class="footer-note">Lozabo · Portale documentale</p>
    </footer>
</div>
<script src="./js/upload.js"></script>
</body>
</html>
